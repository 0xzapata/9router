# ──────────────────────────────────────────────────────────────────────
#  9router — Docker Compose
# ──────────────────────────────────────────────────────────────────────
#
#  Profiles:
#    base  → minimal image, no CLI tools
#    cli   → Kilocode CLI installed inside the container
#
#  Usage:
#    docker compose --profile base up -d
#    docker compose --profile cli up -d
#    docker compose --profile base down
#    docker compose --profile cli logs -f
#
# ──────────────────────────────────────────────────────────────────────

x-common: &common
  restart: unless-stopped
  stop_grace_period: 40s
  env_file: .env
  environment:
    - DATA_DIR=/app/data
    - PORT=${PORT:-20128}
  volumes:
    - ./data:/app/data
  healthcheck:
    test: ["CMD", "bun", "healthcheck.js"]
    interval: 30s
    timeout: 5s
    retries: 3
    start_period: 15s

services:
  # ── Profile: base (minimal, no CLI tools) ──────────────────────────
  9router-base:
    <<: *common
    container_name: 9router
    build:
      context: .
      target: runner
    image: 9router:base
    ports:
      - "${PORT:-20128}:${PORT:-20128}"
    profiles:
      - base

  # ── Profile: cli (Kilocode CLI installed) ─────────────────────────
  9router-cli:
    <<: *common
    container_name: 9router
    build:
      context: .
      target: runner-cli
    image: 9router:cli
    ports:
      - "${PORT:-20128}:${PORT:-20128}"
    profiles:
      - cli
